<!-- Product Card — Minimal Style matching screenshot -->
<div class="col-6 col-md-4 col-lg-2">
    <div class="product-card-minimal">
        <a href="{{ url_for('product.detail', slug=product.slug) }}" class="product-card-img-link">
            <div class="product-card-img-wrap">
                <img src="{{ product.primary_image }}" alt="{{ product.name }}" loading="lazy">
                {% if product.discount_percent > 0 %}
                <span class="product-badge-sale">-{{ product.discount_percent }}%</span>
                {% endif %}
            </div>
        </a>
        <div class="product-card-info">
            <div class="product-card-name-row">
                <a href="{{ url_for('product.detail', slug=product.slug) }}" class="product-card-name">{{ product.name }}</a>
                <button class="product-card-heart" title="Add to Wishlist"><i class="bi bi-heart"></i></button>
            </div>
            <div class="product-card-price">₹{{ "%.0f"|format(product.price) }}</div>
        </div>
    </div>
</div>
