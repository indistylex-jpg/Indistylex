{% extends "admin/base_admin.html" %}
{% block title %}Add Coupon{% endblock %}

{% block content %}
<div class="mb-4">
  <a href="{{ url_for('admin.coupons') }}" class="text-decoration-none">
    <i class="bi bi-arrow-left me-1"></i>Back to Coupons
  </a>
</div>
<h4 class="fw-bold mb-4">{{ title }}</h4>

<div class="card border-0 shadow-sm">
  <div class="card-body p-4">
    <form method="POST" novalidate style="max-width:500px;">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">

      <div class="mb-3">
        <label class="form-label">Coupon Code</label>
        <input type="text" class="form-control text-uppercase font-monospace" name="code"
               placeholder="e.g. SUMMER50" required style="text-transform:uppercase;">
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Discount Type</label>
          <select class="form-select" name="discount_type">
            <option value="percentage">Percentage (%)</option>
            <option value="flat">Flat Amount (₹)</option>
          </select>
        </div>
        <div class="col-6">
          <label class="form-label">Discount Value</label>
          <input type="number" class="form-control" name="discount_value" step="0.01" required>
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Min Order Amount (₹)</label>
          <input type="number" class="form-control" name="min_order_amount" value="0" step="0.01">
        </div>
        <div class="col-6">
          <label class="form-label">Max Uses <small class="text-muted">(0 = unlimited)</small></label>
          <input type="number" class="form-control" name="max_uses" value="0">
        </div>
      </div>

      <div class="row g-3 mb-3">
        <div class="col-6">
          <label class="form-label">Valid From</label>
          <input type="date" class="form-control" name="valid_from">
        </div>
        <div class="col-6">
          <label class="form-label">Valid Until</label>
          <input type="date" class="form-control" name="valid_until">
        </div>
      </div>

      <div class="form-check mb-4">
        <input type="checkbox" class="form-check-input" name="is_active" checked>
        <label class="form-check-label">Active</label>
      </div>

      <button type="submit" class="btn btn-primary">Create Coupon</button>
      <a href="{{ url_for('admin.coupons') }}" class="btn btn-outline-secondary ms-2">Cancel</a>
    </form>
  </div>
</div>
{% endblock %}
