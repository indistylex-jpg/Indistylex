<!DOCTYPE html>
<html><head><meta charset="UTF-8"></head>
<body style="font-family:'Segoe UI',Arial,sans-serif; background:#f8f9fa; margin:0; padding:20px;">
  <div style="max-width:600px; margin:0 auto; background:#fff; border-radius:8px; overflow:hidden;">
    <div style="background:#1A56DB; padding:30px; text-align:center;">
      <h1 style="color:#fff; margin:0; font-size:24px;">Order Update</h1>
    </div>
    <div style="padding:30px;">
      <p>Hi {{ order.user.first_name if order.user else 'Customer' }},</p>
      <p>Your order <strong>{{ order.order_number }}</strong> has been updated:</p>
      <div style="text-align:center; margin:30px 0;">
        <span style="background:#27AE60; color:#fff; padding:10px 25px; border-radius:20px; font-size:18px; font-weight:bold;">
          {{ order.status | title }}
        </span>
      </div>
      <p style="color:#666;">If you have any questions about your order, please contact us.</p>
    </div>
    <div style="background:#f8f9fa; padding:20px; text-align:center; font-size:12px; color:#999;">
      &copy; 2026 Indistylex | support@indistylex.in
    </div>
  </div>
</body></html>
