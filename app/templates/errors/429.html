{% extends "base.html" %}
{% block title %}Too Many Requests — Indistylex{% endblock %}
{% block meta_robots %}noindex, nofollow{% endblock %}
{% block content %}
<section class="py-5">
  <div class="container text-center">
    <div class="py-5">
      <i class="bi bi-shield-exclamation display-1 text-warning"></i>
      <h1 class="mt-3 fw-bold">Too Many Requests</h1>
      <p class="text-muted fs-5">You've made too many requests. Please wait a moment and try again.</p>
      <a href="{{ url_for('main.index') }}" class="btn btn-primary mt-3">
        <i class="bi bi-house me-2"></i>Back to Home
      </a>
    </div>
  </div>
</section>
{% endblock %}
