{% extends "base.html" %}
{% block title %}Server Error{% endblock %}
{% block content %}
<section class="py-5 text-center">
  <div class="container">
    <h1 class="display-1 fw-bold text-danger">500</h1>
    <h3 class="mb-3">Something Went Wrong</h3>
    <p class="text-muted mb-4">We're sorry, something unexpected happened. Please try again later.</p>
    <a href="{{ url_for('main.index') }}" class="btn btn-primary">Go to Homepage</a>
  </div>
</section>
{% endblock %}
