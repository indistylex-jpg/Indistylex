<form method="GET" action="{{ url_for('shop.listing') }}" id="filterForm">
    {% if request.args.get('q') %}
    <input type="hidden" name="q" value="{{ request.args.get('q') }}">
    {% endif %}

    <!-- Categories -->
    <div class="filter-group">
        <h6 class="filter-group-title">Categories</h6>
        <ul class="filter-list">
            {% for cat in categories %}
            <li class="filter-list-item">
                <input class="filter-checkbox" type="radio" name="category"
                       value="{{ cat.slug }}" id="fcat-{{ cat.id }}"
                       {{ "checked" if request.args.get('category') == cat.slug }}>
                <label for="fcat-{{ cat.id }}">{{ cat.name }}</label>
            </li>
            {% endfor %}
        </ul>
    </div>

    <!-- Color -->
    <div class="filter-group">
        <h6 class="filter-group-title">Color</h6>
        <div class="filter-color-grid">
            {% for color in ['Black', 'White', 'Blue', 'Red', 'Green', 'Brown', 'Grey', 'Navy'] %}
            <label class="filter-color-swatch" title="{{ color }}">
                <input type="radio" name="color" value="{{ color|lower }}" {{ "checked" if request.args.get('color') == color|lower }}>
                <span class="filter-swatch" style="background: {{ color|lower }};"></span>
                <span class="filter-color-name">{{ color }}</span>
            </label>
            {% endfor %}
        </div>
    </div>

    <!-- Size -->
    <div class="filter-group">
        <h6 class="filter-group-title">Size</h6>
        <div class="filter-size-grid">
            {% for size in ['XS', 'S', 'M', 'L', 'XL', 'XXL'] %}
            <label class="filter-size-box">
                <input type="radio" name="size" value="{{ size }}" {{ "checked" if request.args.get('size') == size }}>
                <span>{{ size }}</span>
            </label>
            {% endfor %}
        </div>
    </div>

    <!-- Price Range -->
    <div class="filter-group">
        <h6 class="filter-group-title">Price</h6>
        <div class="filter-price-inputs">
            <input type="number" class="filter-price-input" name="min_price"
                   placeholder="₹ Min" value="{{ request.args.get('min_price', '') }}">
            <span class="filter-price-sep">–</span>
            <input type="number" class="filter-price-input" name="max_price"
                   placeholder="₹ Max" value="{{ request.args.get('max_price', '') }}">
        </div>
    </div>

    <button type="submit" class="filter-apply-btn">APPLY</button>
</form>
