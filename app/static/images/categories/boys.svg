<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E8F4FD"/>
      <stop offset="100%" stop-color="#D0ECFF"/>
    </linearGradient>
    <linearGradient id="tshirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#51CFCF"/>
      <stop offset="100%" stop-color="#2AA8A8"/>
    </linearGradient>
    <linearGradient id="shorts" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1E3A5F"/>
      <stop offset="100%" stop-color="#142944"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D0B0"/>
      <stop offset="100%" stop-color="#E8BA94"/>
    </linearGradient>
    <linearGradient id="cap" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E8547A"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="55" cy="60" r="35" fill="#51CFCF" opacity="0.08"/>
  <circle cx="350" cy="75" r="45" fill="#FF6B9D" opacity="0.06"/>
  <circle cx="45" cy="435" r="40" fill="#FFB347" opacity="0.07"/>
  <circle cx="360" cy="425" r="50" fill="#51CFCF" opacity="0.05"/>
  <circle cx="200" cy="40" r="25" fill="#A78BFA" opacity="0.06"/>

  <!-- Playful stars -->
  <g fill="#FFB347" opacity="0.15">
    <polygon points="70,420 73,428 81,428 75,433 77,441 70,436 63,441 65,433 59,428 67,428"/>
    <polygon points="345,60 347,66 353,66 348,70 350,76 345,72 340,76 342,70 337,66 343,66"/>
    <polygon points="55,170 57,175 62,175 58,178 60,183 55,180 50,183 52,178 48,175 53,175"/>
  </g>

  <!-- Small dots pattern -->
  <g fill="#51CFCF" opacity="0.08">
    <circle cx="330" cy="160" r="4"/>
    <circle cx="345" cy="180" r="3"/>
    <circle cx="70" cy="320" r="4"/>
    <circle cx="55" cy="340" r="3"/>
  </g>

  <!-- Sports elements -->
  <!-- Soccer ball (top-right) -->
  <g transform="translate(340,130)" opacity="0.1">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#1E3A5F" stroke-width="2"/>
    <path d="M0,-18 L5,-8 L-5,-8 Z M-17,-6 L-8,-3 L-12,6 Z M17,-6 L8,-3 L12,6 Z M-10,15 L-4,7 L4,7 L10,15 Z" fill="#1E3A5F"/>
  </g>

  <!-- Lightning bolt (left) -->
  <g transform="translate(60,80)" fill="#FFB347" opacity="0.12">
    <polygon points="10,0 4,15 12,15 2,30 8,17 0,17"/>
  </g>

  <!-- === Boy Character === -->
  <g transform="translate(200,260)">

    <!-- Shadow under feet -->
    <ellipse cx="0" cy="145" rx="45" ry="8" fill="#000" opacity="0.05"/>

    <!-- Baseball Cap -->
    <path d="M-26,-155 C-22,-170 22,-170 26,-155 L28,-145 L-28,-145 Z" fill="url(#cap)"/>
    <rect x="-30" y="-148" width="60" height="6" rx="3" fill="url(#cap)"/>
    <!-- Cap brim -->
    <path d="M24,-148 L45,-142 L44,-136 L24,-142" fill="#E8547A"/>
    <!-- Cap button -->
    <circle cx="0" cy="-168" r="3" fill="#FF8DB7"/>
    <!-- Cap stripe -->
    <path d="M-18,-164 C-10,-168 10,-168 18,-164" stroke="white" stroke-width="1.5" fill="none" opacity="0.4"/>

    <!-- Head -->
    <ellipse cx="0" cy="-128" rx="24" ry="27" fill="url(#skin)"/>

    <!-- Short spiky hair (visible under cap) -->
    <rect x="-24" y="-148" width="7" height="16" rx="3" fill="#3D1F10"/>
    <rect x="17" y="-148" width="7" height="16" rx="3" fill="#3D1F10"/>
    <!-- Hair fringe under cap -->
    <path d="M-20,-145 C-15,-140 -8,-142 -4,-145" stroke="#3D1F10" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Eyebrows -->
    <path d="M-12,-120 C-10,-122 -6,-122 -4,-120" stroke="#3D1F10" stroke-width="1.5" fill="none"/>
    <path d="M4,-120 C6,-122 10,-122 12,-120" stroke="#3D1F10" stroke-width="1.5" fill="none"/>

    <!-- Eyes - big happy -->
    <g transform="translate(-8,-115)">
      <ellipse cx="0" cy="0" rx="5" ry="5" fill="white"/>
      <ellipse cx="0.5" cy="0.5" rx="3" ry="3.2" fill="#2C3E50"/>
      <circle cx="1.2" cy="-0.8" r="1.2" fill="white"/>
    </g>
    <g transform="translate(8,-115)">
      <ellipse cx="0" cy="0" rx="5" ry="5" fill="white"/>
      <ellipse cx="-0.5" cy="0.5" rx="3" ry="3.2" fill="#2C3E50"/>
      <circle cx="0.7" cy="-0.8" r="1.2" fill="white"/>
    </g>

    <!-- Happy cheeks -->
    <circle cx="-16" cy="-108" r="5" fill="#FFB4B4" opacity="0.3"/>
    <circle cx="16" cy="-108" r="5" fill="#FFB4B4" opacity="0.3"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-109" rx="2.2" ry="1.8" fill="#E8BA94" opacity="0.5"/>

    <!-- Big happy grin -->
    <path d="M-8,-103 Q0,-95 8,-103" stroke="#8B6040" stroke-width="1.5" fill="none"/>
    <path d="M-6,-103 Q0,-97 6,-103" fill="#FFB4B4" opacity="0.3"/>

    <!-- Ears -->
    <ellipse cx="-24" cy="-125" rx="5" ry="7" fill="#E8BA94"/>
    <ellipse cx="24" cy="-125" rx="5" ry="7" fill="#E8BA94"/>

    <!-- Neck -->
    <rect x="-5" y="-100" width="10" height="10" rx="4" fill="url(#skin)"/>

    <!-- T-shirt -->
    <path d="M-20,-92 C-26,-92 -32,-86 -35,-78
             L-42,-55 L-34,-47 L-26,-65 L-24,-25
             L24,-25 L26,-65 L34,-47 L42,-55 L35,-78
             C32,-86 26,-92 20,-92 Z"
          fill="url(#tshirt)"/>
    <!-- T-shirt collar -->
    <path d="M-12,-92 Q0,-83 12,-92" stroke="#2AA8A8" stroke-width="2" fill="none"/>
    <!-- Number on shirt -->
    <text x="0" y="-50" text-anchor="middle" font-family="Arial" font-size="22" font-weight="bold" fill="white" opacity="0.7">7</text>
    <!-- Shirt stripes -->
    <line x1="-18" y1="-65" x2="18" y2="-65" stroke="white" stroke-width="1" opacity="0.2"/>
    <line x1="-20" y1="-58" x2="20" y2="-58" stroke="white" stroke-width="1" opacity="0.2"/>

    <!-- Arms -->
    <path d="M-34,-47 C-38,-32 -36,-15 -32,0" stroke="url(#skin)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M34,-47 C38,-30 37,-10 34,5" stroke="url(#skin)" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Hands -->
    <ellipse cx="-32" cy="2" rx="5" ry="6" fill="#E8BA94"/>
    <ellipse cx="34" cy="7" rx="5" ry="6" fill="#E8BA94"/>

    <!-- Wristband -->
    <rect x="-36" y="-5" width="8" height="4" rx="2" fill="#FFB347"/>
    <rect x="30" y="0" width="8" height="4" rx="2" fill="#FFB347"/>

    <!-- Cargo Shorts -->
    <path d="M-22,-28 L-26,20 L-8,20 L-5,-5 L0,0 L5,-5 L8,20 L26,20 L22,-28 Z" fill="url(#shorts)"/>
    <!-- Pockets -->
    <rect x="-20" y="-20" width="10" height="10" rx="2" stroke="#2A4A6F" stroke-width="0.8" fill="none" opacity="0.4"/>
    <rect x="10" y="-20" width="10" height="10" rx="2" stroke="#2A4A6F" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Belt -->
    <rect x="-20" y="-28" width="40" height="4" rx="2" fill="#8B6040"/>
    <rect x="-2" y="-29" width="4" height="6" rx="1" fill="#C8A060"/>

    <!-- Legs -->
    <line x1="-16" y1="18" x2="-16" y2="60" stroke="url(#skin)" stroke-width="7" stroke-linecap="round"/>
    <line x1="16" y1="18" x2="16" y2="60" stroke="url(#skin)" stroke-width="7" stroke-linecap="round"/>

    <!-- Socks -->
    <rect x="-20" y="52" width="8" height="10" rx="2" fill="white"/>
    <rect x="12" y="52" width="8" height="10" rx="2" fill="white"/>
    <line x1="-19" y1="56" x2="-13" y2="56" stroke="#51CFCF" stroke-width="0.8"/>
    <line x1="13" y1="56" x2="19" y2="56" stroke="#51CFCF" stroke-width="0.8"/>

    <!-- Sneakers -->
    <path d="M-24,60 L-8,60 L-5,68 L-27,68 Z" fill="#2C3E50"/>
    <path d="M-23,63 L-10,63" stroke="white" stroke-width="1"/>
    <path d="M-22,65 L-11,65" stroke="white" stroke-width="0.8"/>
    <circle cx="-8" cy="63" r="1.5" fill="#FF6B9D"/>
    <path d="M8,60 L24,60 L27,68 L5,68 Z" fill="#2C3E50"/>
    <path d="M10,63 L23,63" stroke="white" stroke-width="1"/>
    <path d="M11,65 L22,65" stroke="white" stroke-width="0.8"/>
    <circle cx="24" cy="63" r="1.5" fill="#FF6B9D"/>
  </g>

  <!-- "COOL" text badge -->
  <g transform="translate(310,320)">
    <rect x="-25" y="-12" width="50" height="24" rx="12" fill="#FFB347" opacity="0.15"/>
    <text x="0" y="5" text-anchor="middle" font-family="Arial" font-size="11" font-weight="bold" fill="#FFB347" opacity="0.3">COOL</text>
  </g>

  <!-- Skateboard (bottom-left decoration) -->
  <g transform="translate(75,440)" opacity="0.1">
    <rect x="-25" y="-4" width="50" height="8" rx="4" fill="#FF6B9D"/>
    <circle cx="-15" cy="6" r="4" fill="#333"/>
    <circle cx="15" cy="6" r="4" fill="#333"/>
  </g>
</svg>
