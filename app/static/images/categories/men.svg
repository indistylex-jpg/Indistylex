<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EDF2FA"/>
      <stop offset="100%" stop-color="#DCE6F5"/>
    </linearGradient>
    <linearGradient id="blazer" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A1A2E"/>
      <stop offset="100%" stop-color="#16213E"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#EDCAA8"/>
      <stop offset="100%" stop-color="#D4A574"/>
    </linearGradient>
    <linearGradient id="pants" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2C3E50"/>
      <stop offset="100%" stop-color="#1A252F"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="60" cy="60" r="45" fill="#1A56DB" opacity="0.04"/>
  <circle cx="345" cy="85" r="55" fill="#2C3E50" opacity="0.04"/>
  <circle cx="50" cy="430" r="50" fill="#60A5FA" opacity="0.04"/>
  <circle cx="360" cy="420" r="55" fill="#1A56DB" opacity="0.04"/>

  <!-- === Man in smart casual === -->
  <g transform="translate(200,240)">
    <!-- Hair -->
    <path d="M-20,-150 C-18,-165 18,-165 20,-150 L22,-138 C22,-136 20,-132 18,-134
             L-18,-134 C-20,-132 -22,-136 -22,-138 Z" fill="#1A1A2E"/>
    <!-- Side hair -->
    <path d="M-22,-138 C-24,-145 -23,-150 -20,-150" fill="#1A1A2E"/>
    <path d="M22,-138 C24,-145 23,-150 20,-150" fill="#1A1A2E"/>
    <!-- Head -->
    <ellipse cx="0" cy="-125" rx="22" ry="26" fill="url(#skin)"/>
    <!-- Hair on top of head  -->
    <path d="M-18,-148 C-12,-158 12,-158 18,-148 L20,-140 C14,-146 -14,-146 -20,-140 Z" fill="#1A1A2E"/>
    <!-- Styled hair texture -->
    <path d="M-10,-150 C-5,-155 5,-155 10,-150" stroke="#2A2A3E" stroke-width="0.8" fill="none" opacity="0.3"/>
    <!-- Eyebrows -->
    <path d="M-12,-133 L-3,-135" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>
    <path d="M3,-135 L12,-133" stroke="#1A1A2E" stroke-width="1.5" fill="none"/>
    <!-- Eyes -->
    <ellipse cx="-7" cy="-128" rx="2.2" ry="2.5" fill="#1A1A2E"/>
    <ellipse cx="7" cy="-128" rx="2.2" ry="2.5" fill="#1A1A2E"/>
    <!-- Nose -->
    <path d="M0,-124 L2,-118 L-1,-117" stroke="#D4A574" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Slight smile -->
    <path d="M-4,-114 Q0,-111 4,-114" stroke="#8B6040" stroke-width="1.2" fill="none"/>
    <!-- Jawline definition -->
    <path d="M-20,-110 Q-22,-118 -22,-125" stroke="#D4A574" stroke-width="0.5" fill="none" opacity="0.2"/>
    <path d="M20,-110 Q22,-118 22,-125" stroke="#D4A574" stroke-width="0.5" fill="none" opacity="0.2"/>

    <!-- Neck -->
    <rect x="-6" y="-100" width="12" height="14" rx="4" fill="url(#skin)"/>

    <!-- Shirt collar visible -->
    <path d="M-14,-88 L-6,-78 L0,-84 L6,-78 L14,-88" fill="#FFFFFF" stroke="#E0E0E0" stroke-width="0.5"/>
    <!-- Tie -->
    <path d="M-3,-84 L0,-78 L3,-84 L2,-50 L0,-46 L-2,-50 Z" fill="#1A56DB"/>
    <path d="M-4,-84 L0,-80 L4,-84 Z" fill="#1A56DB"/>
    <!-- Tie knot -->
    <rect x="-3" y="-86" width="6" height="4" rx="1" fill="#1A56DB"/>

    <!-- Blazer -->
    <path d="M-28,-88 C-32,-88 -36,-84 -38,-78
             L-46,-50 L-38,-30 L-32,-10
             L-30,60 L-18,60 L-16,-10 L-14,-80
             L0,-72 L14,-80 L16,-10 L18,60 L30,60
             L32,-10 L38,-30 L46,-50 L38,-78
             C36,-84 32,-88 28,-88 Z"
          fill="url(#blazer)"/>
    <!-- Blazer lapels -->
    <path d="M-14,-88 L-8,-70 L-16,-60 L-24,-88 Z" fill="#1E2440" stroke="#161D35" stroke-width="0.3"/>
    <path d="M14,-88 L8,-70 L16,-60 L24,-88 Z" fill="#1E2440" stroke="#161D35" stroke-width="0.3"/>
    <!-- Blazer buttons -->
    <circle cx="-2" cy="-40" r="2" fill="#60A5FA" opacity="0.7"/>
    <circle cx="-2" cy="-28" r="2" fill="#60A5FA" opacity="0.7"/>
    <!-- Breast pocket -->
    <path d="M-20,-68 L-12,-68 L-12,-58 L-20,-60 Z" stroke="#161D35" stroke-width="0.5" fill="none" opacity="0.3"/>
    <!-- Pocket square -->
    <path d="M-19,-68 L-15,-64 L-13,-68" fill="#2563EB" opacity="0.6"/>
    <!-- Blazer seam lines -->
    <path d="M-30,10 L-30,60" stroke="#161D35" stroke-width="0.4" opacity="0.2"/>
    <path d="M30,10 L30,60" stroke="#161D35" stroke-width="0.4" opacity="0.2"/>

    <!-- Arms in blazer -->
    <path d="M-46,-50 C-48,-30 -46,0 -42,30" stroke="url(#blazer)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <path d="M46,-50 C48,-30 46,0 42,30" stroke="url(#blazer)" stroke-width="14" stroke-linecap="round" fill="none"/>
    <!-- Shirt cuffs -->
    <rect x="-48" y="26" width="13" height="6" rx="2" fill="#FFFFFF"/>
    <rect x="36" y="26" width="13" height="6" rx="2" fill="#FFFFFF"/>
    <!-- Hands -->
    <ellipse cx="-42" cy="36" rx="5" ry="6" fill="url(#skin)"/>
    <ellipse cx="42" cy="36" rx="5" ry="6" fill="url(#skin)"/>
    <!-- Watch -->
    <rect x="-49" y="24" width="8" height="5" rx="1.5" fill="#2C3E50" stroke="#60A5FA" stroke-width="0.5"/>

    <!-- Trousers -->
    <path d="M-28,58 L-30,165 L-18,165 L-14,80 L0,70 L14,80 L18,165 L30,165 L28,58 Z" fill="url(#pants)"/>
    <!-- Trouser crease -->
    <line x1="-24" y1="70" x2="-24" y2="162" stroke="#1A252F" stroke-width="0.5" opacity="0.15"/>
    <line x1="24" y1="70" x2="24" y2="162" stroke="#1A252F" stroke-width="0.5" opacity="0.15"/>

    <!-- Belt -->
    <rect x="-28" y="56" width="56" height="6" rx="2" fill="#3D2B1F"/>
    <rect x="-3" y="56" width="8" height="6" rx="1" fill="#60A5FA"/>

    <!-- Shoes -->
    <path d="M-32,163 L-16,163 L-14,168 L-12,170 L-34,170 L-32,163 Z" fill="#1A1A2E"/>
    <path d="M16,163 L32,163 L34,170 L12,170 L14,168 L16,163 Z" fill="#1A1A2E"/>
    <line x1="-32" y1="166" x2="-14" y2="166" stroke="#2A2A3E" stroke-width="0.5"/>
    <line x1="16" y1="166" x2="34" y2="166" stroke="#2A2A3E" stroke-width="0.5"/>
  </g>

  <!-- Floating fashion elements -->
  <g opacity="0.08">
    <path d="M325,55 L330,68 L344,68 L333,76 L337,89 L325,80 L313,89 L317,76 L306,68 L320,68 Z" fill="#60A5FA"/>
    <circle cx="65" cy="400" r="18" fill="#1A56DB"/>
    <rect x="310" y="400" width="24" height="30" rx="5" fill="#2C3E50"/>
    <path d="M316,400 L316,392 Q316,385 322,385 Q328,385 328,392 L328,400" stroke="#2C3E50" stroke-width="2" fill="none"/>
  </g>
</svg>
