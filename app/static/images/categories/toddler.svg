<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF9E6"/>
      <stop offset="100%" stop-color="#FFF0C8"/>
    </linearGradient>
    <linearGradient id="overalls" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#8B6FE0"/>
    </linearGradient>
    <linearGradient id="shirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#FF6B9D"/>
      <stop offset="100%" stop-color="#E8547A"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D0B0"/>
      <stop offset="100%" stop-color="#E8BA94"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="400" height="500" fill="url(#bg)"/>

  <!-- Decorative circles -->
  <circle cx="55" cy="55" r="30" fill="#A78BFA" opacity="0.07"/>
  <circle cx="350" cy="70" r="40" fill="#FF6B9D" opacity="0.06"/>
  <circle cx="50" cy="440" r="38" fill="#51CFCF" opacity="0.07"/>
  <circle cx="355" cy="430" r="45" fill="#FFB347" opacity="0.06"/>

  <!-- Playful confetti dots -->
  <g opacity="0.12">
    <circle cx="80" cy="80" r="4" fill="#FF6B9D"/>
    <circle cx="320" cy="100" r="3" fill="#51CFCF"/>
    <circle cx="340" cy="380" r="4" fill="#FFB347"/>
    <circle cx="60" cy="360" r="3" fill="#A78BFA"/>
    <circle cx="100" cy="440" r="3" fill="#FF6B9D"/>
    <circle cx="300" cy="430" r="4" fill="#51CFCF"/>
  </g>

  <!-- Stars -->
  <g fill="#FFB347" opacity="0.13">
    <polygon points="340,55 342,61 348,61 343,65 345,71 340,67 335,71 337,65 332,61 338,61"/>
    <polygon points="65,400 67,405 72,405 68,408 70,413 65,410 60,413 62,408 58,405 63,405"/>
  </g>

  <!-- ABC blocks (learning theme) -->
  <g opacity="0.08">
    <rect x="310" y="370" width="28" height="28" rx="4" fill="#FF6B9D"/>
    <text x="324" y="390" text-anchor="middle" font-family="Arial" font-size="15" font-weight="bold" fill="white">A</text>
    <rect x="340" y="385" width="24" height="24" rx="4" fill="#51CFCF"/>
    <text x="352" y="402" text-anchor="middle" font-family="Arial" font-size="13" font-weight="bold" fill="white">B</text>
  </g>

  <!-- Crayon (left side) -->
  <g transform="translate(70,340) rotate(-15)" opacity="0.1">
    <rect x="-4" y="-25" width="8" height="35" rx="1" fill="#FF6B9D"/>
    <polygon points="-3,-25 3,-25 0,-35" fill="#E8BA94"/>
    <rect x="-4" y="5" width="8" height="5" rx="0" fill="#E8547A"/>
  </g>

  <!-- === Toddler Character === -->
  <g transform="translate(200,255)">

    <!-- Shadow -->
    <ellipse cx="0" cy="145" rx="40" ry="7" fill="#000" opacity="0.04"/>

    <!-- Curly/messy toddler hair -->
    <g fill="#5C3317">
      <ellipse cx="0" cy="-148" rx="30" ry="20"/>
      <circle cx="-20" cy="-150" r="10"/>
      <circle cx="20" cy="-150" r="10"/>
      <circle cx="-25" cy="-140" r="8"/>
      <circle cx="25" cy="-140" r="8"/>
      <circle cx="0" cy="-158" r="8"/>
      <circle cx="-10" cy="-156" r="8"/>
      <circle cx="10" cy="-156" r="8"/>
    </g>

    <!-- Head (slightly large — toddler proportions) -->
    <ellipse cx="0" cy="-122" rx="30" ry="33" fill="url(#skin)"/>

    <!-- Eyes - big curious eyes -->
    <g transform="translate(-10,-118)">
      <ellipse cx="0" cy="0" rx="6.5" ry="7" fill="white"/>
      <ellipse cx="0.5" cy="0.5" rx="4" ry="4.3" fill="#3D2210"/>
      <circle cx="1.5" cy="-1" r="1.6" fill="white"/>
      <circle cx="-0.5" cy="1.5" r="0.8" fill="white" opacity="0.5"/>
    </g>
    <g transform="translate(10,-118)">
      <ellipse cx="0" cy="0" rx="6.5" ry="7" fill="white"/>
      <ellipse cx="-0.5" cy="0.5" rx="4" ry="4.3" fill="#3D2210"/>
      <circle cx="1" cy="-1" r="1.6" fill="white"/>
      <circle cx="-1" cy="1.5" r="0.8" fill="white" opacity="0.5"/>
    </g>

    <!-- Eyebrows (curious expression) -->
    <path d="M-15,-127 C-12,-130 -7,-130 -5,-127" stroke="#5C3317" stroke-width="1.3" fill="none"/>
    <path d="M5,-127 C7,-130 12,-130 15,-127" stroke="#5C3317" stroke-width="1.3" fill="none"/>

    <!-- Rosy cheeks -->
    <circle cx="-20" cy="-108" r="6" fill="#FFB4B4" opacity="0.25"/>
    <circle cx="20" cy="-108" r="6" fill="#FFB4B4" opacity="0.25"/>

    <!-- Button nose -->
    <ellipse cx="0" cy="-108" rx="3" ry="2.5" fill="#E8BA94" opacity="0.5"/>

    <!-- Happy open mouth (toddler grin) -->
    <path d="M-7,-100 Q0,-92 7,-100" stroke="#C8907A" stroke-width="1.5" fill="#FFE0E0" opacity="0.6"/>
    <!-- Tiny teeth showing -->
    <rect x="-3" y="-100" width="6" height="3" rx="1" fill="white" opacity="0.5"/>

    <!-- Ears -->
    <ellipse cx="-30" cy="-120" rx="6" ry="8" fill="#E8BA94"/>
    <ellipse cx="30" cy="-120" rx="6" ry="8" fill="#E8BA94"/>

    <!-- Neck -->
    <rect x="-5" y="-90" width="10" height="10" rx="4" fill="url(#skin)"/>

    <!-- Striped T-shirt (under overalls) -->
    <path d="M-20,-82 C-24,-82 -30,-76 -32,-68
             L-38,-48 L-30,-40 L-24,-55 L-22,-20
             L22,-20 L24,-55 L30,-40 L38,-48 L32,-68
             C30,-76 24,-82 20,-82 Z"
          fill="url(#shirt)"/>
    <!-- Shirt stripes -->
    <line x1="-18" y1="-68" x2="18" y2="-68" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="-19" y1="-60" x2="19" y2="-60" stroke="white" stroke-width="2" opacity="0.3"/>
    <line x1="-20" y1="-52" x2="20" y2="-52" stroke="white" stroke-width="2" opacity="0.3"/>

    <!-- Overalls -->
    <path d="M-18,-35 L-20,45 L20,45 L18,-35 Z" fill="url(#overalls)"/>
    <!-- Overalls straps -->
    <path d="M-14,-35 L-10,-60 L-5,-60 L-8,-35" fill="url(#overalls)"/>
    <path d="M14,-35 L10,-60 L5,-60 L8,-35" fill="url(#overalls)"/>
    <!-- Overalls buttons -->
    <circle cx="-10" cy="-52" r="2.5" fill="#FFB347"/>
    <circle cx="10" cy="-52" r="2.5" fill="#FFB347"/>
    <!-- Front pocket -->
    <path d="M-10,-15 L-10,0 L10,0 L10,-15 Z" fill="#8B6FE0" opacity="0.3"/>
    <path d="M-10,-15 L10,-15" stroke="#8B6FE0" stroke-width="1" opacity="0.4"/>
    <!-- Star on pocket -->
    <polygon points="0,-10 2,-5 7,-5 3,-2 4,3 0,0 -4,3 -3,-2 -7,-5 -2,-5" fill="#FFB347" opacity="0.4"/>

    <!-- Overalls legs -->
    <path d="M-18,43 L-22,80 L-4,80 L-2,43 Z" fill="url(#overalls)"/>
    <path d="M18,43 L22,80 L4,80 L2,43 Z" fill="url(#overalls)"/>

    <!-- Arms -->
    <path d="M-30,-40 C-34,-28 -33,-12 -30,0" stroke="url(#skin)" stroke-width="8" stroke-linecap="round" fill="none"/>
    <path d="M30,-40 C34,-28 33,-12 30,0" stroke="url(#skin)" stroke-width="8" stroke-linecap="round" fill="none"/>

    <!-- Hands (chubby toddler hands) -->
    <circle cx="-30" cy="2" r="6" fill="#E8BA94"/>
    <circle cx="30" cy="2" r="6" fill="#E8BA94"/>

    <!-- Toddler holding a small toy star -->
    <g transform="translate(34,-2)">
      <polygon points="0,-8 2,-3 7,-3 3,0 4,5 0,2 -4,5 -3,0 -7,-3 -2,-3" fill="#FFB347" opacity="0.6"/>
    </g>

    <!-- Legs -->
    <line x1="-12" y1="78" x2="-12" y2="100" stroke="url(#skin)" stroke-width="7" stroke-linecap="round"/>
    <line x1="12" y1="78" x2="12" y2="100" stroke="url(#skin)" stroke-width="7" stroke-linecap="round"/>

    <!-- Cute shoes -->
    <path d="M-19,97 L-5,97 L-3,105 L-22,105 Z" fill="#51CFCF" rx="3"/>
    <circle cx="-12" cy="100" r="1.5" fill="white" opacity="0.5"/>
    <path d="M5,97 L19,97 L22,105 L3,105 Z" fill="#51CFCF" rx="3"/>
    <circle cx="12" cy="100" r="1.5" fill="white" opacity="0.5"/>
  </g>

  <!-- Toy blocks (bottom-left) -->
  <g transform="translate(75,425)" opacity="0.1">
    <rect x="-12" y="-12" width="24" height="24" rx="3" fill="#FFB347"/>
    <rect x="8" y="-5" width="20" height="20" rx="3" fill="#51CFCF"/>
  </g>
</svg>
