<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#EFF6FF"/>
      <stop offset="100%" stop-color="#DBEAFE"/>
    </linearGradient>
    <linearGradient id="dress" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D0B0"/>
      <stop offset="100%" stop-color="#E8BA94"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Soft decorative circles -->
  <circle cx="55" cy="55" r="45" fill="#2563EB" opacity="0.05"/>
  <circle cx="360" cy="90" r="60" fill="#60A5FA" opacity="0.05"/>
  <circle cx="45" cy="440" r="50" fill="#1A56DB" opacity="0.04"/>
  <circle cx="365" cy="420" r="55" fill="#2563EB" opacity="0.04"/>

  <!-- === Woman in elegant dress === -->
  <g transform="translate(200,240)">
    <!-- Long flowing hair -->
    <path d="M-26,-132 C-32,-148 -15,-162 0,-162 C15,-162 32,-148 26,-132
             L30,-100 C36,-82 40,-50 36,-25 L35,5 C33,12 28,15 22,10 L20,-100
             M-20,-100 L-22,10 C-28,15 -33,12 -35,5 L-36,-25 C-40,-50 -36,-82 -30,-100 Z"
          fill="#2C1810"/>
    <!-- Head -->
    <ellipse cx="0" cy="-125" rx="22" ry="27" fill="url(#skin)"/>
    <!-- Hair front bangs -->
    <path d="M-20,-145 C-15,-160 15,-160 20,-145 L18,-135 C12,-142 -12,-142 -18,-135 Z" fill="#2C1810"/>
    <path d="M-18,-140 C-12,-148 0,-150 5,-145" stroke="#3D2215" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Face details -->
    <ellipse cx="-7" cy="-127" rx="2" ry="2.5" fill="#2C1810"/>
    <ellipse cx="7" cy="-127" rx="2" ry="2.5" fill="#2C1810"/>
    <path d="M-10,-130 Q-7,-132 -4,-130" stroke="#2C1810" stroke-width="0.7" fill="none"/>
    <path d="M4,-130 Q7,-132 10,-130" stroke="#2C1810" stroke-width="0.7" fill="none"/>
    <path d="M-3.5,-118 Q0,-115 3.5,-118" stroke="#1E40AF" stroke-width="1.5" fill="none"/>
    <circle cx="-3" cy="-120" r="3.5" fill="#F5D0B0" opacity="0.3"/>
    <circle cx="3" cy="-120" r="3.5" fill="#F5D0B0" opacity="0.3"/>
    <!-- Earrings -->
    <circle cx="-22" cy="-122" r="2.5" fill="#60A5FA"/>
    <circle cx="22" cy="-122" r="2.5" fill="#60A5FA"/>

    <!-- Neck -->
    <rect x="-5" y="-99" width="10" height="14" rx="4" fill="url(#skin)"/>
    <!-- Necklace -->
    <path d="M-14,-88 Q0,-80 14,-88" stroke="#60A5FA" stroke-width="1.8" fill="none"/>
    <path d="M-3,-82 L0,-78 L3,-82" fill="#60A5FA"/>

    <!-- Elegant wrap dress -->
    <path d="M-20,-86 C-28,-86 -30,-82 -32,-76
             L-44,-48 L-35,-44 L-24,-68  L-22,0
             C-25,40 -50,90 -58,120  L-52,125
             C-28,85 -18,50 -14,20
             L-8,120 C-3,145 0,155 3,145 L8,120
             L14,20 C18,50 28,85 52,125 L58,120
             C50,90 25,40 22,0  L24,-68
             L35,-44 L44,-48 L32,-76
             C30,-82 28,-86 20,-86 Z"
          fill="url(#dress)"/>
    <!-- Wrap V-neckline detail -->
    <path d="M-16,-86 L0,-60 L16,-86" stroke="#1E3A8A" stroke-width="0.8" fill="none" opacity="0.25"/>
    <path d="M-8,-76 L0,-64 L8,-76" stroke="#60A5FA" stroke-width="0.5" fill="none" opacity="0.2"/>
    <!-- Waist belt -->
    <path d="M-20,-18 Q0,-14 20,-18 Q0,-22 -20,-18 Z" fill="#60A5FA" opacity="0.9"/>
    <circle cx="0" cy="-18" r="3.5" fill="#60A5FA" stroke="#3B82F6" stroke-width="0.5"/>
    <!-- Fabric folds on skirt -->
    <path d="M-12,10 Q-16,50 -30,95" stroke="#1E3A8A" stroke-width="0.7" fill="none" opacity="0.12"/>
    <path d="M12,10 Q16,50 30,95" stroke="#1E3A8A" stroke-width="0.7" fill="none" opacity="0.12"/>
    <path d="M0,15 Q-2,60 -5,110" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.08"/>
    <!-- Sleeve flutter detail -->
    <path d="M-35,-44 C-38,-40 -40,-36 -37,-32" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M35,-44 C38,-40 40,-36 37,-32" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.15"/>

    <!-- Arms -->
    <path d="M-35,-44 C-38,-30 -40,-5 -38,20" stroke="url(#skin)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <path d="M35,-44 C38,-30 42,0 39,25" stroke="url(#skin)" stroke-width="7" stroke-linecap="round" fill="none"/>
    <!-- Hands -->
    <ellipse cx="-38" cy="22" rx="4.5" ry="5.5" fill="#E8BA94"/>
    <ellipse cx="39" cy="27" rx="4.5" ry="5.5" fill="#E8BA94"/>
    <!-- Clutch purse in hand -->
    <rect x="32" y="22" width="16" height="10" rx="3" fill="#60A5FA"/>
    <rect x="32" y="26" width="16" height="1" fill="#3B82F6" opacity="0.5"/>
    <circle cx="40" cy="24" r="1.5" fill="#3B82F6"/>

    <!-- Legs below dress -->
    <line x1="-6" y1="150" x2="-8" y2="172" stroke="#E8BA94" stroke-width="5.5" stroke-linecap="round"/>
    <line x1="6" y1="150" x2="8" y2="172" stroke="#E8BA94" stroke-width="5.5" stroke-linecap="round"/>
    <!-- Stiletto heels -->
    <path d="M-13,170 L-3,170 Q-2,175 -2,178 L-15,178 Q-14,175 -13,170 Z" fill="#1A56DB"/>
    <path d="M-13,178 L-16,192 L-14,192 L-12,178" fill="#1A56DB"/>
    <path d="M3,170 L13,170 Q14,175 15,178 L2,178 Q2,175 3,170 Z" fill="#1A56DB"/>
    <path d="M13,178 L16,192 L14,192 L12,178" fill="#1A56DB"/>
  </g>

  <!-- Floating fashion accessories -->
  <g opacity="0.1">
    <path d="M52,355 Q52,345 62,345 L78,345 Q88,345 88,355 L88,375 Q88,380 83,380 L57,380 Q52,380 52,375 Z" fill="#2563EB"/>
    <path d="M60,345 L60,336 Q60,328 70,328 Q80,328 80,336 L80,345" stroke="#2563EB" stroke-width="2.5" fill="none"/>
    <path d="M325,55 L330,68 L344,68 L333,76 L337,89 L325,80 L313,89 L317,76 L306,68 L320,68 Z" fill="#60A5FA"/>
  </g>
</svg>
