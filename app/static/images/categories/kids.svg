<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="400" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFF9E6"/>
      <stop offset="100%" stop-color="#FFF0C8"/>
    </linearGradient>
    <linearGradient id="tshirt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB"/>
      <stop offset="100%" stop-color="#D63A7A"/>
    </linearGradient>
    <linearGradient id="shorts" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1A56DB"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
    <linearGradient id="skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5D0B0"/>
      <stop offset="100%" stop-color="#E8BA94"/>
    </linearGradient>
  </defs>
  <rect width="400" height="500" fill="url(#bg)"/>
  <!-- Decorative elements -->
  <circle cx="55" cy="60" r="35" fill="#2563EB" opacity="0.06"/>
  <circle cx="350" cy="80" r="45" fill="#1A56DB" opacity="0.04"/>
  <circle cx="45" cy="430" r="45" fill="#60A5FA" opacity="0.05"/>
  <circle cx="355" cy="420" r="55" fill="#2563EB" opacity="0.04"/>

  <!-- Playful stars -->
  <g fill="#60A5FA" opacity="0.12">
    <polygon points="75,400 78,408 86,408 80,413 82,421 75,416 68,421 70,413 64,408 72,408"/>
    <polygon points="340,65 342,70 348,70 343,74 345,80 340,76 335,80 337,74 332,70 338,70"/>
    <polygon points="55,280 57,285 62,285 58,288 60,293 55,290 50,293 52,288 48,285 53,285"/>
  </g>
  <!-- ABC blocks decorative -->
  <g opacity="0.06">
    <rect x="320" y="380" width="30" height="30" rx="4" fill="#1A56DB"/>
    <text x="335" y="402" text-anchor="middle" font-family="Arial" font-size="16" font-weight="bold" fill="#60A5FA">A</text>
    <rect x="340" y="395" width="25" height="25" rx="4" fill="#2563EB"/>
    <text x="352" y="413" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="white">B</text>
    <circle cx="65" cy="370" r="15" fill="#2563EB"/>
    <circle cx="80" cy="385" r="12" fill="#60A5FA"/>
  </g>

  <!-- === TWO KIDS: Boy and Girl === -->

  <!-- Boy (left) -->
  <g transform="translate(155,260)">
    <!-- Cap -->
    <path d="M-18,-142 C-14,-154 14,-154 18,-142 L20,-134 L-20,-134 Z" fill="#1A56DB"/>
    <rect x="-22" y="-136" width="44" height="5" rx="2" fill="#1A56DB"/>
    <path d="M18,-136 L32,-132 L30,-128 L18,-131" fill="#1A56DB"/>
    <!-- Head -->
    <ellipse cx="0" cy="-120" rx="18" ry="21" fill="url(#skin)"/>
    <!-- Short hair sides -->
    <rect x="-18" y="-134" width="5" height="12" rx="2" fill="#3D1F10"/>
    <rect x="13" y="-134" width="5" height="12" rx="2" fill="#3D1F10"/>
    <!-- Eyes - big happy -->
    <g transform="translate(-6,-122)">
      <ellipse cx="0" cy="0" rx="3.5" ry="3.5" fill="white"/>
      <ellipse cx="0.5" cy="0.5" rx="2.2" ry="2.4" fill="#2C3E50"/>
      <circle cx="1" cy="-0.8" r="0.8" fill="white"/>
    </g>
    <g transform="translate(6,-122)">
      <ellipse cx="0" cy="0" rx="3.5" ry="3.5" fill="white"/>
      <ellipse cx="-0.5" cy="0.5" rx="2.2" ry="2.4" fill="#2C3E50"/>
      <circle cx="0.5" cy="-0.8" r="0.8" fill="white"/>
    </g>
    <!-- Happy cheeks -->
    <circle cx="-11" cy="-116" r="3.5" fill="#FFB4B4" opacity="0.35"/>
    <circle cx="11" cy="-116" r="3.5" fill="#FFB4B4" opacity="0.35"/>
    <!-- Big smile -->
    <path d="M-5,-112 Q0,-107 5,-112" stroke="#8B6040" stroke-width="1.2" fill="#FFB4B4" opacity="0.4"/>
    <!-- Nose -->
    <circle cx="0" cy="-117" r="1.5" fill="#E8BA94" opacity="0.5"/>

    <!-- Neck -->
    <rect x="-3.5" y="-100" width="7" height="8" rx="3" fill="url(#skin)"/>

    <!-- T-shirt (bright colored) -->
    <path d="M-14,-93 C-18,-93 -22,-88 -24,-82
             L-30,-65 L-24,-58 L-18,-72 L-16,-40
             L16,-40 L18,-72 L24,-58 L30,-65 L24,-82
             C22,-88 18,-93 14,-93 Z"
          fill="url(#tshirt)"/>
    <!-- Collar -->
    <path d="M-8,-93 Q0,-86 8,-93" stroke="#D63A7A" stroke-width="1" fill="none" opacity="0.3"/>
    <!-- Star design on shirt -->
    <polygon points="0,-72 3,-64 10,-64 4,-59 6,-52 0,-56 -6,-52 -4,-59 -10,-64 -3,-64" fill="#60A5FA" opacity="0.6"/>

    <!-- Arms -->
    <path d="M-24,-58 C-26,-45 -25,-30 -22,-18" stroke="url(#skin)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <path d="M24,-58 C27,-42 28,-25 24,-12" stroke="url(#skin)" stroke-width="5.5" stroke-linecap="round" fill="none"/>
    <!-- Hands -->
    <ellipse cx="-22" cy="-16" rx="3.5" ry="4.5" fill="#E8BA94"/>
    <ellipse cx="24" cy="-10" rx="3.5" ry="4.5" fill="#E8BA94"/>

    <!-- Cargo shorts -->
    <path d="M-15,-42 L-18,0 L-6,0 L-4,-20 L0,-15 L4,-20 L6,0 L18,0 L15,-42 Z" fill="url(#shorts)"/>
    <!-- Pocket -->
    <rect x="-14" y="-35" width="8" height="8" rx="1" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.3"/>
    <rect x="6" y="-35" width="8" height="8" rx="1" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Legs -->
    <line x1="-12" y1="-1" x2="-12" y2="30" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>
    <line x1="12" y1="-1" x2="12" y2="30" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>

    <!-- Sneakers -->
    <path d="M-17,28 L-7,28 L-5,33 L-19,33 Z" fill="#2C3E50"/>
    <path d="M-16,30 L-8,30" stroke="white" stroke-width="0.8"/>
    <path d="M7,28 L17,28 L19,33 L5,33 Z" fill="#2C3E50"/>
    <path d="M8,30 L16,30" stroke="white" stroke-width="0.8"/>
  </g>

  <!-- Girl (right) -->
  <g transform="translate(255,260)">
    <!-- Hair with headband -->
    <path d="M-16,-138 C-12,-150 12,-150 16,-138 L18,-110
             C22,-95 24,-75 20,-60
             M-18,-110 C-22,-95 -24,-75 -20,-60" fill="#5C3317"/>
    <!-- Headband -->
    <path d="M-18,-136 C-12,-142 12,-142 18,-136" stroke="#60A5FA" stroke-width="3" fill="none"/>
    <!-- Bow on headband -->
    <path d="M12,-140 L18,-146 L16,-138 L22,-136 Z" fill="#60A5FA"/>
    <path d="M12,-140 L6,-146 L8,-138 L2,-136 Z" fill="#60A5FA"/>

    <!-- Head -->
    <ellipse cx="0" cy="-118" rx="18" ry="21" fill="url(#skin)"/>
    <!-- Hair bangs -->
    <path d="M-15,-135 C-10,-142 10,-142 15,-135 L13,-126 C8,-132 -8,-132 -13,-126 Z" fill="#5C3317"/>

    <!-- Big cute eyes -->
    <g transform="translate(-6,-120)">
      <ellipse cx="0" cy="0" rx="3.5" ry="4" fill="white"/>
      <ellipse cx="0.5" cy="0.5" rx="2.3" ry="2.8" fill="#3D1F10"/>
      <circle cx="1" cy="-1" r="0.9" fill="white"/>
      <!-- Eyelashes -->
      <path d="M-3.5,-2 L-5,-4" stroke="#3D1F10" stroke-width="0.6"/>
      <path d="M3.5,-2 L5,-4" stroke="#3D1F10" stroke-width="0.6"/>
    </g>
    <g transform="translate(6,-120)">
      <ellipse cx="0" cy="0" rx="3.5" ry="4" fill="white"/>
      <ellipse cx="-0.5" cy="0.5" rx="2.3" ry="2.8" fill="#3D1F10"/>
      <circle cx="0.5" cy="-1" r="0.9" fill="white"/>
      <path d="M-3.5,-2 L-5,-4" stroke="#3D1F10" stroke-width="0.6"/>
      <path d="M3.5,-2 L5,-4" stroke="#3D1F10" stroke-width="0.6"/>
    </g>
    <!-- Blush -->
    <circle cx="-11" cy="-114" r="3.5" fill="#FFB4B4" opacity="0.4"/>
    <circle cx="11" cy="-114" r="3.5" fill="#FFB4B4" opacity="0.4"/>
    <!-- Happy smile -->
    <path d="M-5,-110 Q0,-106 5,-110" stroke="#1E40AF" stroke-width="1.2" fill="#FFB4B4" opacity="0.4"/>
    <!-- Nose -->
    <circle cx="0" cy="-115" r="1.3" fill="#E8BA94" opacity="0.5"/>

    <!-- Neck -->
    <rect x="-3.5" y="-98" width="7" height="8" rx="3" fill="url(#skin)"/>

    <!-- Cute top -->
    <path d="M-14,-91 C-16,-91 -20,-86 -22,-80
             L-26,-66 L-20,-60 L-16,-72 L-14,-55
             L14,-55 L16,-72 L20,-60 L26,-66 L22,-80
             C20,-86 16,-91 14,-91 Z"
          fill="#60A5FA"/>
    <!-- Collar ruffle -->
    <path d="M-10,-91 Q-6,-95 0,-88 Q6,-95 10,-91" stroke="#3B82F6" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Flower on top -->
    <circle cx="0" cy="-75" r="4" fill="white" opacity="0.5"/>
    <circle cx="0" cy="-75" r="2" fill="#2563EB" opacity="0.6"/>

    <!-- Skirt -->
    <path d="M-14,-55 C-18,-55 -38,10 -40,30 L-38,34 Q0,26 38,34 L40,30 C38,10 18,-55 14,-55 Z" fill="#1A56DB"/>
    <!-- Skirt folds -->
    <path d="M-6,-55 C-10,-20 -18,10 -22,28" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.15"/>
    <path d="M6,-55 C10,-20 18,10 22,28" stroke="#1E3A8A" stroke-width="0.5" fill="none" opacity="0.15"/>
    <!-- Waistband -->
    <rect x="-14" y="-57" width="28" height="4" rx="2" fill="#2563EB"/>

    <!-- Arms -->
    <path d="M-20,-60 C-22,-48 -21,-32 -18,-20" stroke="url(#skin)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <path d="M20,-60 C22,-45 24,-28 20,-16" stroke="url(#skin)" stroke-width="5" stroke-linecap="round" fill="none"/>
    <!-- Hands -->
    <ellipse cx="-18" cy="-18" rx="3.5" ry="4.5" fill="#E8BA94"/>
    <ellipse cx="20" cy="-14" rx="3.5" ry="4.5" fill="#E8BA94"/>
    <!-- Teddy bear in hand -->
    <g transform="translate(22,-20) scale(0.5)">
      <ellipse cx="0" cy="0" rx="10" ry="12" fill="#C69C6D"/>
      <circle cx="0" cy="-10" r="8" fill="#C69C6D"/>
      <circle cx="-5" cy="-12" r="3" fill="#A0784C"/>
      <circle cx="5" cy="-12" r="3" fill="#A0784C"/>
      <circle cx="-3" cy="-9" r="1" fill="#2C1810"/>
      <circle cx="3" cy="-9" r="1" fill="#2C1810"/>
      <ellipse cx="0" cy="-6" rx="2" ry="1.5" fill="#2C1810"/>
    </g>

    <!-- Legs -->
    <line x1="-8" y1="32" x2="-10" y2="55" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>
    <line x1="8" y1="32" x2="10" y2="55" stroke="url(#skin)" stroke-width="5" stroke-linecap="round"/>
    <!-- Frilly socks -->
    <path d="M-14,50 Q-10,46 -6,50 L-6,60 L-14,60 Z" fill="white"/>
    <path d="M6,50 Q10,46 14,50 L14,60 L6,60 Z" fill="white"/>
    <!-- Cute shoes -->
    <path d="M-16,58 L-4,58 L-2,63 L-18,63 Z" fill="#2563EB"/>
    <circle cx="-10" cy="59" r="1" fill="#60A5FA"/>
    <path d="M4,58 L16,58 L18,63 L2,63 Z" fill="#2563EB"/>
    <circle cx="10" cy="59" r="1" fill="#60A5FA"/>
  </g>
</svg>
